<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camellia Order • Ficha Jujutsu Kaisen</title>
  <style>
    :root {
      --roxo: #8B00FF;
      --rosa: #FF0088;
      --dark: #0F0F1A;
      --card: #1A1A2E;
    }
    body {
      margin: 0;
      background: linear-gradient(135deg, #0A0A14, #1A0033);
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
    }
    header {
      background: rgba(10,10,20,0.98);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 5px solid var(--roxo);
    }
    .logo { font-size: 36px; font-weight: bold; background: linear-gradient(90deg, var(--roxo), var(--rosa)); -webkit-background-clip: text; color: transparent; }

    .container {
      max-width: 1500px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
      padding: 0 25px;
    }
    .sidebar {
      background: var(--card);
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 0 35px rgba(139,0,255,0.35);
    }
    .sidebar img {
      width: 100%;
      border-radius: 14px;
      border: 4px solid var(--rosa);
      margin-bottom: 20px;
      cursor: pointer;
    }
    .main { display: flex; flex-direction: column; gap: 25px; }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 20px;
      text-align: center;
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
    }
    .value { font-size: 36px; font-weight: bold; cursor: pointer; }
    .value:hover { color: var(--rosa); }

    .circle {
      width: 400px; height: 400px;
      border: 16px solid var(--roxo);
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle, #1A1A2E, #0A0A14);
      margin: 20px auto;
      box-shadow: 0 0 50px rgba(139,0,255,0.7);
    }
    .attr {
      position: absolute;
      font-weight: bold;
      text-align: center;
      width: 110px;
      cursor: pointer;
    }
    .attr:hover { transform: scale(1.1); text-shadow: 0 0 15px var(--rosa); }

    .tab-buttons {
      display: flex;
      background: #111;
      border-radius: 14px;
      padding: 8px;
      gap: 8px;
    }
    .tab-btn {
      flex: 1;
      padding: 16px;
      background: transparent;
      border: none;
      color: #ccc;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--roxo);
      color: white;
    }
    .tab-content {
      background: var(--card);
      padding: 30px;
      border-radius: 16px;
      min-height: 520px;
    }
    input, select, textarea {
      background: #111;
      border: 1px solid #666;
      color: white;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-bottom: 8px;
    }
    button {
      padding: 8px 14px;
      background: var(--roxo);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 4px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">CAMELLIA ORDER</div>
    <h1>2ª Edição — Jujutsu Kaisen</h1>
  </header>

  <div class="container">
    <div class="sidebar">
      <img id="avatar" src="https://via.placeholder.com/320x320/1A0033/FFFFFF?text=Portrait" onclick="document.getElementById('avatar-upload').click()">
      <input type="file" id="avatar-upload" accept="image/*" style="display:none" onchange="carregarImagem(event)">

      <input type="text" id="nome" placeholder="Nome do Feiticeiro">

      <label>Espécie</label>
      <select id="especie" onchange="calcularTudo()">
        <option value="humano">Humano</option>
        <option value="mestico">Mestiço / Híbrido</option>
        <option value="shimuriano">Shimuriano</option>
        <option value="corpo">Corpo Amaldiçoado Autoconsciente</option>
      </select>

      <label>Clã / Origem</label>
      <select id="cla" onchange="toggleCustomCla()">
        <option value="nenhum">Nenhum / Independente</option>
        <option value="zenin">Clã Zenin</option>
        <option value="gojo">Clã Gojo</option>
        <option value="kamo">Clã Kamo</option>
        <option value="inumaki">Clã Inumaki</option>
        <option value="custom">Criar Clã Próprio</option>
      </select>

      <div id="custom-cla" style="display:none;">
        <input type="text" id="nome-cla" placeholder="Nome do seu Clã">
      </div>

      <label>Peculiaridade</label>
      <select id="peculiaridade">
        <option value="nenhuma">Nenhuma</option>
        <option value="gemeos">Gêmeos Monozigotos</option>
        <option value="restricao-inativa">Restrição Celestial Inativa</option>
        <option value="restricao-completa">Restrição Celestial Completa</option>
        <option value="restricao-fisica">Restrição Celestial Física</option>
        <option value="hospedeiro">Hospedeiro</option>
        <option value="hospedeiro-passivo">Hospedeiro Passivo</option>
        <option value="reencarnado">Feiticeiro Reencarnado</option>
        <option value="sem-inata">Sem Inata</option>
        <option value="absurdo">Absurdo</option>
      </select>

      <label>Grau</label>
      <select id="grau">
        <option value="4">Grau 4</option>
        <option value="3">Grau 3</option>
        <option value="2">Grau 2</option>
        <option value="1">Grau 1</option>
        <option value="especial">Grau Especial</option>
      </select>

      <label>Possui EAR?</label>
      <select id="ear">
        <option value="nao">Não</option>
        <option value="sim">Sim</option>
      </select>

      <label style="color:#00aaff;">Possui Seis Olhos?</label>
      <select id="seis-olhos">
        <option value="nao">Não</option>
        <option value="sim">Sim</option>
      </select>
    </div>

    <div class="main">
      <div class="status-grid">
        <div><strong>PV</strong><br><span id="pv-atual" class="value" onclick="editarAtual('pv')">150</span> / <span id="pv-total" class="value">150</span></div>
        <div><strong>PEA</strong><br><span id="pea-atual" class="value" onclick="editarAtual('pea')">140</span> / <span id="pea-total" class="value">140</span></div>
        <div><strong>PE</strong><br><span id="pe-atual" class="value" onclick="editarAtual('pe')">100</span> / <span id="pe-total" class="value">100</span></div>
      </div>

      <div class="circle" id="circle"></div>

      <div style="text-align:center; font-size:1.2em;">
        Pontos de Atributo restantes: <strong id="pontos-restantes">5</strong>/5
      </div>

      <div class="tab-buttons">
        <button onclick="mudarTab(0)" class="tab-btn active">Inventário</button>
        <button onclick="mudarTab(1)" class="tab-btn">Repertório</button>
        <button onclick="mudarTab(2)" class="tab-btn">Técnica Inata</button>
        <button onclick="mudarTab(3)" class="tab-btn">Maestria</button>
        <button onclick="mudarTab(4)" class="tab-btn">Shikigamis</button>
      </div>

      <div id="tab-content" class="tab-content"></div>

      <div style="text-align:center;">
        <button onclick="salvarFicha()">💾 Salvar Ficha</button>
        <button onclick="exportarFicha()">📤 Exportar JSON</button>
        <button onclick="carregarFicha()">📥 Carregar Ficha</button>
      </div>
    </div>
  </div>

  <script>
    let atributos = { jujutsu:1, fisico:1, agilidade:1, intelecto:1, carisma:1 };
    let pontosRestantes = 5;
    let statusAtual = { pv:150, pea:140, pe:100 };

    const especies = {
      humano: { pvBase:12, peaBase:16, peBase:5, pvMult:12, peaMult:12 },
      mestico: { pvBase:12, peaBase:20, peBase:5, pvMult:10, peaMult:12 },
      shimuriano: { pvBase:10, peaBase:20, peBase:5, pvMult:10, peaMult:12 },
      corpo: { pvBase:0, peaBase:16, peBase:5, pvMult:0, peaMult:12 }
    };

    function calcularTudo() {
      const esp = document.getElementById('especie').value;
      const base = especies[esp];

      const pvTotal = base.pvBase + (atributos.fisico * base.pvMult);
      const peaTotal = base.peaBase + (atributos.jujutsu * base.peaMult);
      const peTotal = base.peBase + atributos.agilidade + (atributos.intelecto*2) + (atributos.carisma*2);

      document.getElementById('pv-total').textContent = pvTotal;
      document.getElementById('pea-total').textContent = peaTotal;
      document.getElementById('pe-total').textContent = peTotal;

      if (statusAtual.pv > pvTotal) statusAtual.pv = pvTotal;
      if (statusAtual.pea > peaTotal) statusAtual.pea = peaTotal;
      if (statusAtual.pe > peTotal) statusAtual.pe = peTotal;

      document.getElementById('pv-atual').textContent = statusAtual.pv;
      document.getElementById('pea-atual').textContent = statusAtual.pea;
      document.getElementById('pe-atual').textContent = statusAtual.pe;

      document.getElementById('pontos-restantes').textContent = pontosRestantes;
      desenharCirculo();
    }

    function desenharCirculo() {
      const circle = document.getElementById('circle');
      circle.innerHTML = `
        <div class="attr" style="top:12%;left:50%;transform:translate(-50%,-50%)" onclick="editarAtributo('jujutsu')">Jujutsu<br><span style="font-size:28px">${atributos.jujutsu}</span></div>
        <div class="attr" style="top:50%;left:10%;transform:translate(-50%,-50%)" onclick="editarAtributo('fisico')">Físico<br><span style="font-size:28px">${atributos.fisico}</span></div>
        <div class="attr" style="top:50%;right:10%;transform:translate(50%,-50%)" onclick="editarAtributo('agilidade')">Agilidade<br><span style="font-size:28px">${atributos.agilidade}</span></div>
        <div class="attr" style="bottom:12%;left:50%;transform:translate(-50%,50%)" onclick="editarAtributo('intelecto')">Intelecto<br><span style="font-size:28px">${atributos.intelecto}</span></div>
        <div class="attr" style="top:50%;left:50%;transform:translate(-50%,-50%)" onclick="editarAtributo('carisma')">Carisma<br><span style="font-size:28px">${atributos.carisma}</span></div>
      `;
    }

    function editarAtributo(attr) {
      const atual = atributos[attr];
      const novoStr = prompt(`Valor para ${attr} (1 a 4):`, atual);
      if (novoStr === null) return;

      let novo = parseInt(novoStr);
      if (isNaN(novo) || novo < 1 || novo > 4) {
        alert("O valor deve estar entre 1 e 4!");
        return;
      }

      const diff = novo - atual;
      if (diff > 0 && pontosRestantes < diff) {
        alert("Pontos restantes insuficientes!");
        return;
      }

      atributos[attr] = novo;
      pontosRestantes -= diff;
      calcularTudo();
    }

    function editarAtual(tipo) {
      let atual = statusAtual[tipo];
      const novo = prompt(`Valor ATUAL de ${tipo.toUpperCase()}:`, atual);
      if (novo !== null) {
        const val = parseInt(novo);
        if (!isNaN(val) && val >= 0) {
          const total = parseInt(document.getElementById(tipo + '-total').textContent);
          statusAtual[tipo] = Math.min(val, total);
          document.getElementById(tipo + '-atual').textContent = statusAtual[tipo];
        }
      }
    }

    function toggleCustomCla() {
      document.getElementById('custom-cla').style.display = document.getElementById('cla').value === 'custom' ? 'block' : 'none';
    }

    function mudarTab(n) {
      const content = document.getElementById('tab-content');
      if (n === 0) {
        content.innerHTML = `<h2>Inventário</h2><textarea style="height:220px;width:100%;" placeholder="Itens e equipamentos..."></textarea>`;
      } else if (n === 1) {
        content.innerHTML = `<h2>Repertório</h2><textarea style="height:250px;width:100%;" placeholder="Suas informações narrativas..."></textarea>`;
      } else if (n === 2) {
        content.innerHTML = `<h2>Técnica Inata</h2>
          <input type="text" placeholder="Conceito da Técnica Inata">
          <textarea style="height:100px;" placeholder="Descrição completa..."></textarea>
          <p>PT restantes: <strong id="pt-restantes">1</strong></p>
          <h3>Técnicas Extensivas</h3>
          <div id="extensivas-container"></div>
          <h3>Técnica Máxima</h3>
          <input type="text" placeholder="Nome da Técnica Máxima">
          <textarea placeholder="Descrição..."></textarea>
          <h3>Expansão de Domínio</h3>
          <input type="text" placeholder="Nome da Expansão">
          <textarea placeholder="Descrição..."></textarea>`;
        criarExtensivas();
      } else if (n === 3) {
        content.innerHTML = `<h2>Maestria</h2>
          <p>Pontos de Maestria restantes: <strong id="pm-restantes">1</strong></p>
          <div class="maestria-circle" id="maestria-circle"></div>
          <h3>Desbloqueados</h3>
          <div id="maestria-desbloqueados"></div>`;
        desenharMaestria();
      } else if (n === 4) {
        content.innerHTML = `<h2>Shikigamis (12)</h2>
          <p>Crie até 12 shikigamis abaixo:</p>
          <textarea style="height:400px;width:100%;" placeholder="Shikigami 1: Nome, PV, PE, Atributos..."></textarea>`;
      }
    }

    function criarExtensivas() {
      const container = document.getElementById('extensivas-container');
      container.innerHTML = '';
      for (let i = 1; i <= 7; i++) {
        const div = document.createElement('div');
        div.className = 'extensiva';
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleExtensiva(this)">
            <strong>Técnica Extensiva ${i}</strong>
            <button onclick="event.stopImmediatePropagation(); criarExtensiva(${i});">Criar (1 PT)</button>
          </div>
          <div class="ext-details" style="display:none; margin-top:10px;">
            <input type="text" placeholder="Nome da Extensiva">
            <textarea placeholder="Descrição completa..."></textarea>
            <input type="text" placeholder="Custo (ex: 4 PEA e 2 PE)">
            <input type="text" placeholder="Dano (ex: 3d8)">
            <input type="text" placeholder="Alcance (ex: 20m)">
            <input type="text" placeholder="Duração / Recarga">
          </div>
        `;
        container.appendChild(div);
      }
    }

    function toggleExtensiva(el) {
      const details = el.parentElement.querySelector('.ext-details');
      details.style.display = details.style.display === 'none' ? 'block' : 'none';
    }

    function criarExtensiva(i) {
      if (ptRestantes <= 0) return alert("PT insuficientes!");
      ptRestantes--;
      document.getElementById('pt-restantes').textContent = ptRestantes;
      alert(`Técnica Extensiva ${i} criada!`);
    }

    function desenharMaestria() {
      const circle = document.getElementById('maestria-circle');
      circle.innerHTML = `
        <div class="maestria-item" style="top:15%;left:50%;transform:translate(-50%,-50%)" onclick="editarMaestria('liberacao')">Liberação<br><span style="font-size:24px">${maestria.liberacao}</span></div>
        <div class="maestria-item" style="top:50%;left:12%;transform:translate(-50%,-50%)" onclick="editarMaestria('antidominio')">Anti-Domínio<br><span style="font-size:24px">${maestria.antidominio}</span></div>
        <div class="maestria-item" style="top:50%;right:12%;transform:translate(50%,-50%)" onclick="editarMaestria('barreiras')">Barreiras<br><span style="font-size:24px">${maestria.barreiras}</span></div>
        <div class="maestria-item" style="bottom:15%;left:50%;transform:translate(-50%,50%)" onclick="editarMaestria('shikigamis')">Shikigamis<br><span style="font-size:24px">${maestria.shikigamis}</span></div>
      `;

      const desbloqueados = document.getElementById('maestria-desbloqueados');
      let html = '';
      if (maestria.liberacao >= 1) html += `<p><strong>Liberação de Energia:</strong> Manipulação básica de energia amaldiçoada</p>`;
      if (maestria.barreiras >= 1) html += `<p><strong>Técnicas de Barreira:</strong> Desbloqueia Barreiras Simples</p>`;
      if (maestria.antidominio >= 1) html += `<p><strong>Técnicas Anti-Domínio:</strong> Desbloqueia Domínio Simples</p>`;
      if (maestria.shikigamis >= 1) html += `<p><strong>Shikigamis:</strong> Criação de Shikigami Simples</p>`;

      desbloqueados.innerHTML = html || '<p>Nenhuma habilidade desbloqueada ainda.</p>';
    }

    function editarMaestria(tipo) {
      const atual = maestria[tipo];
      const novoStr = prompt(`Pontos em ${tipo} (máximo 5):`, atual);
      if (novoStr === null) return;
      let novo = parseInt(novoStr);
      if (isNaN(novo) || novo < 0 || novo > 5) return alert("Valor inválido!");

      const diff = novo - atual;
      if (diff > 0 && pontosMaestria < diff) return alert("Pontos de Maestria insuficientes!");

      maestria[tipo] = novo;
      pontosMaestria -= diff;
      document.getElementById('pm-restantes').textContent = pontosMaestria;
      desenharMaestria();
    }

    function carregarImagem(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => document.getElementById('avatar').src = ev.target.result;
        reader.readAsDataURL(file);
      }
    }

    function salvarFicha() { 
      const ficha = { nome: document.getElementById('nome').value, especie: document.getElementById('especie').value, atributos, statusAtual };
      localStorage.setItem('camelliaFicha', JSON.stringify(ficha));
      alert('Ficha salva!');
    }

    function exportarFicha() {
      const ficha = { nome: document.getElementById('nome').value, especie: document.getElementById('especie').value, atributos, statusAtual };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ficha, null, 2));
      const a = document.createElement('a');
      a.href = dataStr;
      a.download = "ficha_camellia.json";
      a.click();
    }

    function carregarFicha() {
      const saved = localStorage.getItem('camelliaFicha');
      if (saved) {
        const f = JSON.parse(saved);
        document.getElementById('nome').value = f.nome || '';
        document.getElementById('especie').value = f.especie || 'humano';
        atributos = f.atributos || atributos;
        if (f.statusAtual) statusAtual = f.statusAtual;
        calcularTudo();
      }
    }

    window.onload = () => {
      desenharCirculo();
      calcularTudo();
      mudarTab(0);
    };
  </script>
</body>
</html>
