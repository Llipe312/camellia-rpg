<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camellia Order • Ficha Jujutsu Kaisen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">CAMELLIA ORDER</div>
    <h1>2ª Edição — Jujutsu Kaisen</h1>
  </header>

  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <img id="avatar" src="https://via.placeholder.com/320x320/1A0033/FFFFFF?text=Feiticeiro" alt="Avatar">
      <input type="text" id="nome" placeholder="Nome do Feiticeiro">

      <label>Espécie</label>
      <select id="especie" onchange="calcularTudo()">
        <option value="humano">Humano</option>
        <option value="mestico">Mestiço / Híbrido</option>
        <option value="shimuriano">Shimuriano</option>
        <option value="corpo">Corpo Amaldiçoado Autoconsciente</option>
      </select>

      <label>Clã / Origem</label>
      <select id="cla" onchange="toggleCustomCla()">
        <option value="nenhum">Nenhum / Independente</option>
        <option value="zenin">Clã Zenin</option>
        <option value="gojo">Clã Gojo</option>
        <option value="kamo">Clã Kamo</option>
        <option value="inumaki">Clã Inumaki</option>
        <option value="custom">Criar Clã Próprio</option>
      </select>

      <div id="custom-cla">
        <input type="text" id="nome-cla" placeholder="Nome do seu Clã">
      </div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="status-grid">
        <div><strong>PV</strong><br><span id="pv" class="value">150</span></div>
        <div><strong>PEA</strong><br><span id="pea" class="value">140</span></div>
        <div><strong>PE</strong><br><span id="pe" class="value">100</span></div>
      </div>

      <div class="circle" id="circle"></div>

      <div class="points">
        Pontos de Atributo restantes: <strong id="pontos-restantes">5</strong>/5
      </div>

      <div class="tab-buttons">
        <button onclick="mudarTab(0)" class="tab-btn active">Atributos</button>
        <button onclick="mudarTab(1)" class="tab-btn">Repertório</button>
        <button onclick="mudarTab(2)" class="tab-btn">Técnica Inata</button>
        <button onclick="mudarTab(3)" class="tab-btn">Maestria</button>
      </div>

      <div id="tab-content" class="tab-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
