<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camellia Order • Ficha Jujutsu Kaisen</title>
  <style>
    :root {
      --roxo: #8B00FF;
      --rosa: #FF0088;
      --dark: #0F0F1A;
      --card: #1A1A2E;
    }
    body {
      margin: 0;
      background: linear-gradient(135deg, #0A0A14, #1A0033);
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
    }
    header {
      background: rgba(10,10,20,0.98);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 5px solid var(--roxo);
    }
    .logo { font-size: 36px; font-weight: bold; background: linear-gradient(90deg, var(--roxo), var(--rosa)); -webkit-background-clip: text; color: transparent; }

    .container {
      max-width: 1500px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
      padding: 0 25px;
    }
    .sidebar {
      background: var(--card);
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 0 35px rgba(139,0,255,0.35);
    }
    .sidebar img {
      width: 100%;
      border-radius: 14px;
      border: 4px solid var(--rosa);
      margin-bottom: 20px;
    }
    .main {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 20px;
      text-align: center;
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
    }
    .value { font-size: 38px; font-weight: bold; }
    #pv { color: #ff3366; }
    #pea { color: #bb44ff; }
    #pe { color: #ffaa33; }

    .circle {
      width: 400px; height: 400px;
      border: 16px solid var(--roxo);
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle, #1A1A2E, #0A0A14);
      margin: 20px auto;
      box-shadow: 0 0 50px rgba(139,0,255,0.7);
    }
    .attr {
      position: absolute;
      font-weight: bold;
      text-align: center;
      width: 110px;
      cursor: pointer;
    }
    .attr:hover { transform: scale(1.12); text-shadow: 0 0 15px var(--rosa); }

    .tab-buttons {
      display: flex;
      background: #111;
      border-radius: 14px;
      padding: 8px;
      gap: 8px;
    }
    .tab-btn {
      flex: 1;
      padding: 16px;
      background: transparent;
      border: none;
      color: #ccc;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--roxo);
      color: white;
    }
    .tab-content {
      background: var(--card);
      padding: 30px;
      border-radius: 16px;
      min-height: 480px;
    }
    input, select, textarea {
      background: #111;
      border: 1px solid #666;
      color: white;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-bottom: 12px;
    }
    button {
      padding: 10px 16px;
      background: var(--roxo);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">CAMELLIA ORDER</div>
    <h1>2ª Edição — Jujutsu Kaisen</h1>
  </header>

  <div class="container">
    <div class="sidebar">
      <img id="avatar" src="https://via.placeholder.com/320x320/1A0033/FFFFFF?text=Portrait" alt="Portrait" onclick="document.getElementById('avatar-upload').click()">
      <input type="file" id="avatar-upload" accept="image/*" style="display:none" onchange="carregarImagem(event)">
      
      <input type="text" id="nome" placeholder="Nome do Feiticeiro">

      <label>Espécie</label>
      <select id="especie" onchange="calcularTudo()">
        <option value="humano">Humano</option>
        <option value="mestico">Mestiço / Híbrido</option>
        <option value="shimuriano">Shimuriano</option>
        <option value="corpo">Corpo Amaldiçoado Autoconsciente</option>
      </select>

      <label>Clã / Origem</label>
      <select id="cla" onchange="toggleCustomCla()">
        <option value="nenhum">Nenhum / Independente</option>
        <option value="zenin">Clã Zenin</option>
        <option value="gojo">Clã Gojo</option>
        <option value="kamo">Clã Kamo</option>
        <option value="inumaki">Clã Inumaki</option>
        <option value="custom">Criar Clã Próprio</option>
      </select>

      <div id="custom-cla" style="display:none;">
        <input type="text" id="nome-cla" placeholder="Nome do seu Clã">
      </div>
    </div>

    <div class="main">
      <div class="status-grid">
        <div><strong>PV</strong><br><span id="pv" class="value">150</span></div>
        <div><strong>PEA</strong><br><span id="pea" class="value">140</span></div>
        <div><strong>PE</strong><br><span id="pe" class="value">100</span></div>
      </div>

      <div class="circle" id="circle"></div>

      <div style="text-align:center; font-size:1.2em;">
        Pontos de Atributo restantes: <strong id="pontos-restantes">5</strong>/5
      </div>

      <div class="tab-buttons">
        <button onclick="mudarTab(0)" class="tab-btn active">Atributos</button>
        <button onclick="mudarTab(1)" class="tab-btn">Repertório</button>
        <button onclick="mudarTab(2)" class="tab-btn">Técnica Inata</button>
        <button onclick="mudarTab(3)" class="tab-btn">Maestria</button>
      </div>

      <div id="tab-content" class="tab-content"></div>

      <div style="text-align:center; margin-top:20px;">
        <button onclick="salvarFicha()">💾 Salvar Ficha</button>
        <button onclick="exportarFicha()">📤 Exportar como JSON</button>
        <button onclick="carregarFicha()">📥 Carregar Ficha</button>
      </div>
    </div>
  </div>

  <script>
    let atributos = { jujutsu:1, fisico:1, agilidade:1, intelecto:1, carisma:1 };
    let pontosRestantes = 5;

    const especies = {
      humano: { pvBase:12, peaBase:16, peBase:5, pvMult:12, peaMult:12 },
      mestico: { pvBase:12, peaBase:20, peBase:5, pvMult:10, peaMult:12 },
      shimuriano: { pvBase:10, peaBase:20, peBase:5, pvMult:10, peaMult:12 },
      corpo: { pvBase:0, peaBase:16, peBase:5, pvMult:0, peaMult:12 }
    };

    function calcularTudo() {
      const esp = document.getElementById('especie').value;
      const base = especies[esp];
      const pv = base.pvBase + (atributos.fisico * base.pvMult);
      const pea = base.peaBase + (atributos.jujutsu * base.peaMult);
      const pe = base.peBase + atributos.agilidade + (atributos.intelecto*2) + (atributos.carisma*2);

      document.getElementById('pv').textContent = pv;
      document.getElementById('pea').textContent = pea;
      document.getElementById('pe').textContent = pe;
      document.getElementById('pontos-restantes').textContent = pontosRestantes;
      desenharCirculo();
    }

    function desenharCirculo() {
      const circle = document.getElementById('circle');
      circle.innerHTML = `
        <div class="attr" style="top:12%;left:50%;transform:translate(-50%,-50%)" onclick="aumentarAtributo('jujutsu')">Jujutsu<br><span style="font-size:28px">${atributos.jujutsu}</span></div>
        <div class="attr" style="top:50%;left:10%;transform:translate(-50%,-50%)" onclick="aumentarAtributo('fisico')">Físico<br><span style="font-size:28px">${atributos.fisico}</span></div>
        <div class="attr" style="top:50%;right:10%;transform:translate(50%,-50%)" onclick="aumentarAtributo('agilidade')">Agilidade<br><span style="font-size:28px">${atributos.agilidade}</span></div>
        <div class="attr" style="bottom:12%;left:50%;transform:translate(-50%,50%)" onclick="aumentarAtributo('intelecto')">Intelecto<br><span style="font-size:28px">${atributos.intelecto}</span></div>
        <div class="attr" style="top:50%;left:50%;transform:translate(-50%,-50%)" onclick="aumentarAtributo('carisma')">Carisma<br><span style="font-size:28px">${atributos.carisma}</span></div>
      `;
    }

    function aumentarAtributo(attr) {
      if (pontosRestantes > 0 && atributos[attr] < 5) {
        atributos[attr]++;
        pontosRestantes--;
        calcularTudo();
      }
    }

    function toggleCustomCla() {
      document.getElementById('custom-cla').style.display = document.getElementById('cla').value === 'custom' ? 'block' : 'none';
    }

    function mudarTab(n) {
      const content = document.getElementById('tab-content');
      if (n === 0) content.innerHTML = `<h2>Atributos</h2><p>Clique nos atributos no círculo para distribuir seus 5 pontos.</p>`;
      else if (n === 1) content.innerHTML = `<h2>Repertório</h2><textarea style="height:220px;width:100%;" placeholder="Suas 10 informações narrativas..."></textarea>`;
      else if (n === 2) content.innerHTML = `<h2>Técnica Inata</h2>
        <input type="text" placeholder="Conceito da Inata">
        <textarea style="height:180px;width:100%;" placeholder="Descrição da Técnica..."></textarea>`;
      else content.innerHTML = `<h2>Maestria</h2><p>Distribua Pontos de Maestria (Liberação, Barreiras, etc.)</p>`;
    }

    function carregarImagem(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          document.getElementById('avatar').src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    }

    function salvarFicha() {
      const ficha = {
        nome: document.getElementById('nome').value,
        especie: document.getElementById('especie').value,
        cla: document.getElementById('cla').value,
        atributos: atributos,
        avatar: document.getElementById('avatar').src
      };
      localStorage.setItem('camelliaFicha', JSON.stringify(ficha));
      alert('Ficha salva com sucesso!');
    }

    function exportarFicha() {
      const ficha = {
        nome: document.getElementById('nome').value,
        especie: document.getElementById('especie').value,
        cla: document.getElementById('cla').value,
        atributos: atributos
      };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ficha, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", "ficha_camellia.json");
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function carregarFicha() {
      const saved = localStorage.getItem('camelliaFicha');
      if (saved) {
        const ficha = JSON.parse(saved);
        document.getElementById('nome').value = ficha.nome || '';
        document.getElementById('especie').value = ficha.especie || 'humano';
        document.getElementById('cla').value = ficha.cla || 'nenhum';
        atributos = ficha.atributos || atributos;
        if (ficha.avatar) document.getElementById('avatar').src = ficha.avatar;
        calcularTudo();
        alert('Ficha carregada!');
      }
    }

    window.onload = () => {
      desenharCirculo();
      calcularTudo();
      mudarTab(0);
    };
  </script>
</body>
</html>
